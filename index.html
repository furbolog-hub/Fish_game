<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish_gamebot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <span id="weather-icon">☀️</span>
        <div id="score">Улов: 0.0 кг | Попыток: 3</div>
        
        <button id="handbook-btn">📖 Справочник</button>
        <button id="action-btn">Забросить удочку</button>
        
        <div id="message">Начни рыбалку!</div>

        <div id="catch-history">
            <h3>История улова:</h3>
            <ul id="history-list"></ul>
        </div>

        <div id="final-result" class="hidden"></div>
    </div>

    <div id="modal" class="hidden">
        <div id="modal-content">
            <h3>Удалить предмет?</h3>
            <div id="modal-fish-list"></div>
        </div>
    </div>

    <div id="handbook-modal" class="hidden">
        <div class="handbook-content">
            <span class="close-btn" onclick="document.getElementById('handbook-modal').classList.add('hidden')">&times;</span>
            <div id="handbook-data"></div>
        </div>
    </div>

    <div id="weather-help" class="hidden">
        <div id="help-text" class="help-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
