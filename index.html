<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Рыбалка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

    <div id="game-container">
        <div id="weather-icon">☀️</div>
        <h1 id="score">Улов: 0.0 кг | Попыток: 3</h1>
        <p id="message">Нажми "Забросить", чтобы начать!</p>
        <button id="action-btn">Забросить удочку</button>
        
        <div id="status-effects"></div>
        
        <div id="catch-history">
            <h3>История улова:</h3>
            <ul id="history-list"></ul>
        </div>
        
        <div id="final-result" class="hidden"></div>
    </div>
    
    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>Выберите предмет для удаления:</h3>
            <ul id="modal-fish-list"></ul>
        </div>
    </div>

    <div id="weather-help">
        <div class="help-content">
            <span class="close-btn" onclick="toggleWeatherHelp()">✖</span>
            <h3>Погода:</h3>
            <p id="help-text"></p>
        </div>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
